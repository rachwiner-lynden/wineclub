<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wineclub — what goes with that?</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Playfair+Display:ital@1&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:     #0E0608;
    --cream:  #F2EBD9;
    --gold:   #C9952A;
    --muted:  #7A6A5A;
    --border: #2A1E1A;
    --red:    #C8352A;
    --purple: #2E2472;
    --orange: #D96A1A;
    --green:  #5A7A20;
  }

  html, body { background: var(--bg); }

  body {
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HERO ── */
  .hero {
    position: relative;
    min-height: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 40px 60px;
    overflow: hidden;
  }

  /* Large bold illustrations anchored to corners of the hero */
  .hero-img {
    position: absolute;
    pointer-events: none;
    user-select: none;
  }
  .hi-flute {
    width: 110px;
    bottom: -10px;
    right: 32px;
    transform: rotate(5deg);
  }
  .hi-tomato {
    width: 130px;
    top: 20px;
    left: -10px;
    transform: rotate(-8deg);
  }
  .hi-berries {
    width: 100px;
    bottom: 20px;
    left: 20px;
    transform: rotate(10deg);
  }
  .hi-orange {
    width: 90px;
    top: 10px;
    right: 20px;
    transform: rotate(12deg);
  }

  .eyebrow {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: .35em;
    text-transform: uppercase;
    color: var(--gold);
    text-align: center;
    margin-bottom: 16px;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(64px, 12vw, 100px);
    line-height: .95;
    text-align: center;
    color: var(--cream);
    letter-spacing: .02em;
    position: relative;
    z-index: 1;
  }

  h1 em {
    color: var(--gold);
    font-style: normal;
  }

  .subtitle {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 15px;
    color: var(--muted);
    text-align: center;
    margin-top: 18px;
    position: relative;
    z-index: 1;
  }

  /* ── INPUT SECTION ── */
  .input-section {
    max-width: 560px;
    margin: 0 auto;
    padding: 0 28px 60px;
    position: relative;
  }

  /* Olives sit beside the input */
  .olives-aside {
    position: absolute;
    width: 80px;
    right: -20px;
    top: -20px;
    transform: rotate(-20deg);
    pointer-events: none;
    opacity: .9;
  }

  .field-label {
    display: block;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: .28em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  textarea {
    width: 100%;
    min-height: 100px;
    padding: 16px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--cream);
    background: #1C0E10;
    border: 1px solid #3A2520;
    border-radius: 4px;
    resize: vertical;
    line-height: 1.65;
    outline: none;
    transition: border-color .2s;
    display: block;
  }
  textarea:focus  { border-color: var(--gold); }
  textarea::placeholder { color: #4A3830; }

  .btn {
    margin-top: 12px;
    width: 100%;
    padding: 16px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: .12em;
    color: var(--bg);
    background: var(--gold);
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: background .2s, opacity .2s;
  }
  .btn:hover:not(:disabled) { background: #d9a030; }
  .btn:disabled { background: #3A2E20; color: #6A5A40; cursor: default; }

  /* ── RESULTS ── */
  #output { max-width: 560px; margin: 0 auto; padding: 0 28px 100px; }

  .loading {
    padding: 48px 0;
    text-align: center;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    color: var(--muted);
    font-size: 17px;
  }

  /* Big horizontal rule with illustration */
  .result-divider {
    display: flex;
    align-items: center;
    gap: 20px;
    margin: 8px 0 36px;
  }
  .result-divider-line { flex: 1; height: 1px; background: #2A1E1A; }
  .result-divider img  { width: 60px; transform: rotate(20deg); }

  .result-headline {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    line-height: .95;
    color: var(--cream);
    margin-bottom: 8px;
    letter-spacing: .02em;
  }

  .result-rec {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 20px;
  }

  .result-why {
    font-size: 15px;
    font-weight: 300;
    color: #B8A898;
    line-height: 1.8;
    margin-bottom: 28px;
  }

  /* Cards */
  .cards { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }

  .card {
    padding: 16px 18px;
    background: #1C0E10;
    border-radius: 4px;
    border-left: 3px solid var(--gold);
  }
  .card.green { border-left-color: #6A9A30; }

  .card-label {
    display: block;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: .28em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .card-text {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 15px;
    color: var(--cream);
    line-height: 1.65;
  }
  .card.green .card-text {
    font-family: 'DM Sans', sans-serif;
    font-style: normal;
    font-weight: 400;
    font-size: 15px;
  }

  /* Backup row with illustration */
  .backup {
    display: flex;
    align-items: flex-start;
    gap: 18px;
    padding-top: 24px;
    border-top: 1px solid #2A1E1A;
  }
  .backup img { width: 56px; flex-shrink: 0; transform: rotate(-6deg); margin-top: -4px; }
  .backup-label {
    display: block;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: .28em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .backup-text { font-size: 14px; color: #B8A898; line-height: 1.65; font-weight: 300; }

  .error { color: #C8352A; font-size: 14px; margin-top: 16px; text-align: center; }

  /* Footer */
  .footer {
    text-align: center;
    padding-bottom: 60px;
    font-size: 10px;
    letter-spacing: .25em;
    text-transform: uppercase;
    color: #2A1E1A;
  }
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <img class="hero-img hi-tomato"
    src="https://raw.githubusercontent.com/rachwiner-lynden/wineclub/main/tomato1.png" alt="" />
  <img class="hero-img hi-orange"
    src="https://raw.githubusercontent.com/rachwiner-lynden/wineclub/main/orangeclementine.png" alt="" />
  <img class="hero-img hi-berries"
    src="https://raw.githubusercontent.com/rachwiner-lynden/wineclub/main/blueberries.png" alt="" />
  <img class="hero-img hi-flute"
    src="https://raw.githubusercontent.com/rachwiner-lynden/wineclub/main/champagneflute.png" alt="" />

  <p class="eyebrow">sommelier on call</p>
  <h1>What wine<br>goes with<br><em>that?</em></h1>
  <p class="subtitle">Tell me what you're cooking and I'll find your bottle.</p>
</div>

<!-- INPUT -->
<div class="input-section">
  <img class="olives-aside"
    src="https://raw.githubusercontent.com/rachwiner-lynden/wineclub/main/olives.png" alt="" />
  <label class="field-label" for="meal">What are you making?</label>
  <textarea
    id="meal"
    placeholder="e.g. roast chicken with thyme butter, mushroom risotto, pan-seared salmon..."
  ></textarea>
  <button class="btn" id="btn" onclick="getPairing()">Find my wine</button>
</div>

<!-- RESULTS -->
<div id="output"></div>

<p class="footer">for the home cook who drinks well</p>

<script>
const BASE = "https://raw.githubusercontent.com/rachwiner-lynden/wineclub/main/";

async function getPairing() {
  const meal   = document.getElementById("meal").value.trim();
  if (!meal) return;
  const btn    = document.getElementById("btn");
  const output = document.getElementById("output");

  btn.disabled    = true;
  btn.textContent = "Consulting the cellar…";
  output.innerHTML = `<div class="loading">Thinking about your meal…</div>`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: `You are a world-class award-winning sommelier with a deep love of home cooking. You have encyclopedic knowledge of wines available in Canada, including LCBO imports and VQA Canadian wines from Ontario, BC, and Nova Scotia. You are warm, opinionated, and passionate — connecting food to wine in a way that excites home cooks without intimidating them.

Respond ONLY with a raw JSON object. No markdown. No backticks. No preamble:
{
  "headline": "4–6 word evocative pairing headline, punchy and bold",
  "recommendation": "Specific grape variety and region or wine style",
  "canadian_pick": "One specific Canadian producer or bottle available at the LCBO, with province",
  "why": "2 warm expert sentences on why this pairing works with this specific dish",
  "tasting_notes": "One vivid sensory sentence describing what the wine tastes and smells like",
  "backup": "One brief alternative wine style or region if they cannot find the first"
}`,
        messages: [{ role: "user", content: "I'm making: " + meal }]
      })
    });

    const data  = await res.json();
    const text  = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("");
    const clean = text.replace(/```json|```/g, "").trim();
    const r     = JSON.parse(clean);

    output.innerHTML = `
      <div class="result-divider">
        <div class="result-divider-line"></div>
        <img src="${BASE}olives.png" alt="" />
        <div class="result-divider-line"></div>
      </div>

      <p class="result-headline">${esc(r.headline)}</p>
      <p class="result-rec">${esc(r.recommendation)}</p>
      <p class="result-why">${esc(r.why)}</p>

      <div class="cards">
        <div class="card">
          <span class="card-label">in the glass</span>
          <p class="card-text">${esc(r.tasting_notes)}</p>
        </div>
        <div class="card green">
          <span class="card-label">Canadian pick &middot; at the LCBO</span>
          <p class="card-text">${esc(r.canadian_pick)}</p>
        </div>
      </div>

      <div class="backup">
        <img src="${BASE}tomato2.png" alt="" />
        <div>
          <span class="backup-label">alternatively</span>
          <p class="backup-text">${esc(r.backup)}</p>
        </div>
      </div>
    `;
  } catch(e) {
    output.innerHTML = `<p class="error">Something went wrong — please try again.</p>`;
  }

  btn.disabled    = false;
  btn.textContent = "Find my wine";
}

function esc(s) {
  return String(s || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

document.getElementById("meal").addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); getPairing(); }
});
</script>
</body>
</html>
